name = "alook-web"
main = "custom-worker.ts"
compatibility_date = "2026-04-09"
compatibility_flags = ["nodejs_compat"]
# Disable esbuild keep_names — otherwise __name(...) wrappers leak into
# stringified inline scripts (ThemeScript, next-themes) and throw
# "__name is not defined" at runtime in the browser.
keep_names = false

[observability]
enabled = true
head_sampling_rate = 0.1

[observability.logs]
invocation_logs = true
head_sampling_rate = 0.1
destinations = ["grafana-logs"]

[observability.traces]
enabled = true
head_sampling_rate = 0.05
destinations = ["grafana-traces"]

# OpenNext required bindings
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "alook-web"

# OpenNext internal cache
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "alook-next-cache"

[[d1_databases]]
binding = "NEXT_TAG_CACHE_D1"
database_id = "3c7d3b43-458c-474b-a183-348cd16a1cce"
database_name = "alook-next-tags"

[[durable_objects.bindings]]
name = "NEXT_CACHE_DO_QUEUE"
class_name = "DOQueueHandler"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DOQueueHandler"]

# App bindings
[[d1_databases]]
binding = "DB"
database_id = "8bbbae48-27b7-43b6-a250-b1e0c6c71632"
database_name = "alook-app"

[[r2_buckets]]
binding = "EMAIL_BUCKET"
bucket_name = "alook-emails"

# WS Durable Object is in a separate worker — access via Service Binding
[[services]]
binding = "WS_DO_WORKER"
service = "alook-ws-do"

[[services]]
binding = "EMAIL_WORKER"
service = "alook-email-worker"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "e7f9a1ea67934c58a02cb462d7a976b3"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "3221c07597bc4f68b201601ad136b84e"

[vars]
RUNTIME_MODEL_OPTIONS = '{"claude":["claude-opus-4-6","claude-sonnet-4-6","claude-haiku-4-5"],"codex":["gpt-5.4","gpt-5.3-codex"]}'
MIN_CLI_VERSION = "0.0.122"
ALOOK_DOMAIN = "agents.hypeer.cloud"
NEXT_PUBLIC_ALOOK_DOMAIN = "agents.hypeer.cloud"
CLOUDFLARE_EMAIL_ROUTING_ZONE_ID = "3ecde475c02f6e95eaed42aaa8af4398"
CLOUDFLARE_EMAIL_ROUTING_WORKER = "alook-email-worker"

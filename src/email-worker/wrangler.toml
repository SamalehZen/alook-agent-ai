name = "alook-email-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true
head_sampling_rate = 0.1

[observability.logs]
invocation_logs = true
head_sampling_rate = 0.1
destinations = ["grafana-logs"]

[observability.traces]
enabled = true
head_sampling_rate = 0.05
destinations = ["grafana-traces"]

[dev]
port = 8787
inspector_port = 9231

[vars]
ALOOK_DOMAIN = "agents.hypeer.cloud"

[[d1_databases]]
binding = "DB"
database_id = "8bbbae48-27b7-43b6-a250-b1e0c6c71632"
database_name = "alook-app"

[[r2_buckets]]
binding = "EMAIL_BUCKET"
bucket_name = "alook-emails"

[[services]]
binding = "WEB_SERVICE"
service = "alook-web"

[[send_email]]
name = "SEND_EMAIL"

[[durable_objects.bindings]]
name = "IMAP_POLLER"
class_name = "ImapPollerDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ImapPollerDO"]
